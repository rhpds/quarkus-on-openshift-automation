- name: Print bootstrap_tenant variables
  ansible.builtin.debug:
    msg:
      ocp_ingress_domain: "{{ quarkus_on_openshift_bootstrap_tenant_ocp_ingress_domain }}"
      ocp_api_url: "{{ quarkus_on_openshift_bootstrap_tenant_ocp_api_url }}"
      ocp_api_token: "{{ quarkus_on_openshift_bootstrap_tenant_ocp_api_token }}"
      username: "{{ quarkus_on_openshift_bootstrap_tenant_username }}"
      user_password: "{{ quarkus_on_openshift_bootstrap_tenant_user_password }}"
      namespaces: "{{ quarkus_on_openshift_bootstrap_tenant_namespaces }}"
