---

- name: Print bootstrap_tenant variables
  ansible.builtin.debug:
    msg:
      username: "{{ quarkus_on_openshift_bootstrap_tenant_username }}"
      user_password: "{{ quarkus_on_openshift_bootstrap_tenant_user_password }}"
      namespaces: "{{ quarkus_on_openshift_bootstrap_tenant_namespaces }}"
      _agnosticd_user_data: "{{ lookup('agnosticd.core.agnosticd_user_data', '*') }}"

- name: Create tenant configmap
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: "example-tenant-config"
        namespace: "{{ item }}"
      data:
        hello: "world"
  loop: "{{ quarkus_on_openshift_bootstrap_tenant_namespaces }}"

# TODO: confirm that this is still needed
- name: Create RBAC for monitoring-edit
  kubernetes.core.k8s:
    merge_type:
    - merge
    definition: "{{ lookup('template', 'rbac-monitoring-edit.yml' ) }}"
  loop: "{{ quarkus_on_openshift_bootstrap_tenant_namespaces }}"

- name: Create Keycloak Sub
  kubernetes.core.k8s:
    merge_type:
    - merge
    definition: "{{ lookup('template', 'rhbk-sub.yml' ) }}"
  loop: "{{ quarkus_on_openshift_bootstrap_tenant_namespaces }}"

- name: Create Keycloak OperatorGroup
  kubernetes.core.k8s:
    merge_type:
    - merge
    definition: "{{ lookup('template', 'rhbk-op-grp.yml' ) }}"
  loop: "{{ quarkus_on_openshift_bootstrap_tenant_namespaces }}"
