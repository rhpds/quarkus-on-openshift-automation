apiVersion: v1
kind: LimitRange
metadata:
  name: "{{ quarkus_on_openshift_bootstrap_tenant_username }}-resource-limits"
  namespace: "{{ item }}"
spec:
  limits:
    - type: Container
      max:
        cpu: 4
        memory: 12Gi
      default:
        cpu: 500m
        memory: 1.5Gi
      defaultRequest:
        cpu: 50m
        memory: 256Mi
    - type: Pod
      max:
        cpu: 4
        memory: 12Gi
