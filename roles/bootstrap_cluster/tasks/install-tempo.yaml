---
- name: create project for tempo operator
  k8s:
    state: present
    kind: Project
    api_version: project.openshift.io/v1
    definition:
      metadata:
        name: openshift-tempo-operator

- name: Create OpenShift Objects for tempo
  k8s:
    state: present
    merge_type:
    - strategic-merge
    - merge
    definition: "{{ lookup('file', 'tempo-subscription.yaml') | from_yaml }}"

- name: Create Tempo Operator Group
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('file', 'tempo-op-group.yml') | from_yaml }}"
  retries: 10
  delay: 5
  register: tempo_op_config_result
  until: tempo_op_config_result is not failed

- name: wait for the status of the Tempo subscription to not be empty
  k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: Subscription
    name: tempo-product
    namespace: openshift-tempo-operator
  register: tempo_subscription_out
  until:
    - tempo_subscription_out is defined
    - tempo_subscription_out.resources is defined
    - tempo_subscription_out.resources[0] is defined
    - tempo_subscription_out.resources[0].status is defined
    - tempo_subscription_out.resources[0].status.installplan is defined
  retries: 30
  delay: 20

- name: Wait for Tempo CRD
  k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: tempostacks.tempo.grafana.com
  register: r_tempo_crd
  retries: 200
  delay: 10
  until: r_tempo_crd.resources | list | length == 1


