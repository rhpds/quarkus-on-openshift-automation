---

- name: Print bootstrap_cluster variables
  ansible.builtin.debug:
    msg:
      _agnosticd_user_data: "{{ lookup('agnosticd_user_data', '') }}"
      ocp_ingress_domain: "{{ quarkus_on_openshift_bootstrap_cluster_ocp_ingress_domain }}"
      ocp_api_url: "{{ quarkus_on_openshift_bootstrap_cluster_ocp_api_url }}"
      ocp_api_token: "{{ quarkus_on_openshift_bootstrap_cluster_ocp_api_token }}"

- name: Get ingress controller
  kubernetes.core.k8s_info:
    kind: IngressController
    name: default
    namespace: openshift-ingress-operator
  register: r_ingress

- name: Print ingress domain
  ansible.builtin.debug:
    msg:
      ocp_ingress_domain: "{{ r_ingress.resources[0].status.domain }}"
